name: Publish to Open VSX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT repository secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx ovsx publish -p "$OVSX_PAT"
